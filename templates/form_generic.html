{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block title %}{{ title }} - Posto Gestão{% endblock %}

{% block content %}
<div class="page-header d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2 mb-1">{{ title }}</h1>
</div>

<div class="card form-card">
    <div class="card-body p-4 p-lg-5">
        <form method="post">
            {% csrf_token %}
            {% bootstrap_form form %}
            <div class="mt-4 d-flex gap-2 flex-wrap">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-check2-circle me-1"></i>Salvar
                </button>
                <a href="{{ cancel_url }}" class="btn btn-outline-secondary px-4">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
